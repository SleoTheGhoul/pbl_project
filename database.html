<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReconHub - Database</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-shield-alt"></i><span>ReconHub</span><span class="logo-beta">BETA</span></a>
      <nav class="main-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="query.html" class="nav-item"><i class="fas fa-search"></i> Query</a>
        <a href="database.html" class="nav-item active"><i class="fas fa-database"></i> Database</a>
        <a href="apis.html" class="nav-item"><i class="fas fa-code-branch"></i> APIs</a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
      </nav>
    </header>

    <main class="database-content">
      <h1 class="page-title">Query Database</h1>
      <p class="page-subtitle">Historical reconnaissance data and correlation analysis</p>

      <div class="main-card">
        <div class="db-card-header" style="display:flex; align-items:center; justify-content:space-between;">
          <h2 style="color:#ffffff;"><i class="fas fa-history"></i> Stored Queries</h2>
          <div class="db-controls" style="display:flex; align-items:center;">
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Search records..."></div>
            <button class="filter-button" id="auto-refresh-btn" onclick="toggleAutoRefresh()"><i class="fas fa-sync-alt"></i><span>Auto-Refresh: Off</span></button>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="db-table">
            <thead>
              <tr><th>ID</th><th>TYPE</th><th>QUERY</th><th>THREAT LEVEL</th><th>SOURCE(S)</th><th>TIMESTAMP</th><th>DETAILS</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <section class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="stat-card"><span id="total-records" class="card-value">0</span><span class="card-label">Total Records</span></div>
        <div class="stat-card"><span id="high-threats" class="card-value" style="color:#f44336;">0</span><span class="card-label">High Threats</span></div>
        <div class="stat-card"><span id="unique-sources" class="card-value" style="color:#9c27b0;">0</span><span class="card-label">Unique Sources</span></div>
      </section>
    </main>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
